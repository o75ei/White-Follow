<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>White Follow — لوحة التحكم</title>
<style>
:root{
  --bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;
  --border:#2a2a2a;--border2:#333333;
  --text:#ffffff;--text2:#8c8c8c;
  --accent:#f0a000;--gold:#f0a000;
  --success:#00c853;--warning:#ff9100;--danger:#ff1744;--muted:#666666;
  --font:'Cairo','Tajawal',sans-serif;
  --sb:220px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;max-width:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
a{color:inherit;text-decoration:none;}

/* ─ Layout ─ */
.layout{display:flex;min-height:100vh;width:100%;overflow-x:hidden;}
.sidebar{width:var(--sb);background:var(--card);border-left:1px solid var(--border);position:fixed;top:0;right:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:transform .3s;}
.content{margin-right:var(--sb);padding:16px;flex:1;min-height:100vh;min-width:0;width:calc(100% - var(--sb));box-sizing:border-box;overflow-x:hidden;}

/* ─ Mobile sidebar ─ */
.mob-header{display:none;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90;}
.mob-menu-btn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px;}
.mob-title{font-size:15px;font-weight:800;color:var(--gold);}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;}

/* ─ Sidebar ─ */
.sidebar-logo{padding:16px;border-bottom:1px solid var(--border);text-align:center;}
.sidebar-logo .logo-icon{font-size:26px;margin-bottom:2px;}
.sidebar-logo h1{font-size:15px;font-weight:800;color:var(--gold);}
.sidebar-logo p{font-size:10px;color:var(--text2);margin-top:1px;}
.sidebar-nav{padding:10px 8px;flex:1;overflow-y:auto;}
.nav-section{font-size:10px;color:var(--muted);padding:10px 10px 4px;text-transform:uppercase;letter-spacing:1px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s;margin-bottom:2px;}
.nav-item:hover{background:var(--border);color:var(--text);}
.nav-item.active{background:rgba(240,160,0,0.12);color:var(--gold);}
.nav-item .ni{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);}
/* Provider balance card in sidebar */
.prov-bal-card{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;margin-bottom:10px;text-align:center;}
.prov-bal-label{font-size:10px;color:var(--text2);margin-bottom:3px;}
.prov-bal-value{font-size:16px;font-weight:800;color:var(--gold);}
.logout-btn{width:100%;padding:10px;border:1px solid rgba(255,23,68,.3);border-radius:10px;background:rgba(255,23,68,.08);color:var(--danger);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);}

/* ─ Header ─ */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:18px;font-weight:800;}
.page-subtitle{font-size:12px;color:var(--text2);margin-top:2px;}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:9px 16px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .2s;white-space:nowrap;}
.btn:active{opacity:.7;}
.btn-primary{background:var(--gold);color:#000;}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-blue{background:#1a6fbf;color:#fff;}

/* ─ Stats Grid ─ */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);}
.stat-card.green::before{background:var(--success);}
.stat-card.red::before{background:var(--danger);}
.stat-card.orange::before{background:var(--warning);}
.stat-icon{font-size:22px;margin-bottom:8px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.stat-value{font-size:22px;font-weight:800;}
.stat-value.gold{color:var(--gold);}
.stat-value.green{color:var(--success);}
.stat-sub{font-size:11px;color:var(--text2);margin-top:3px;}

/* ─ Cards ─ */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:700;}
.card-body{padding:16px;}

/* ─ Table ─ */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px;}
th{background:var(--card2);padding:10px 12px;text-align:right;font-size:11px;color:var(--text2);font-weight:600;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}

/* ─ Badge ─ */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-success{background:rgba(0,200,83,.15);color:var(--success);}
.badge-warning{background:rgba(255,145,0,.15);color:var(--warning);}
.badge-danger{background:rgba(255,23,68,.15);color:var(--danger);}
.badge-info{background:rgba(240,160,0,.15);color:var(--gold);}
.badge-muted{background:rgba(102,102,102,.15);color:var(--muted);}

/* ─ Form ─ */
.form-row{display:grid;gap:14px;}
.form-row.cols-2{grid-template-columns:1fr 1fr;}
.form-grp label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600;}
.form-ctrl{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s;}
.form-ctrl:focus{border-color:var(--gold);}
select.form-ctrl option{background:var(--card);}
textarea.form-ctrl{resize:vertical;}

/* ─ Search ─ */
.search-row{display:flex;gap:8px;margin-bottom:14px;}
.search-inp{flex:1;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;min-width:0;}
.search-inp:focus{border-color:var(--gold);}
.search-inp::placeholder{color:var(--muted);}

/* ─ Filter Pills ─ */
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:transparent;}
.pill.active{background:var(--gold);color:#000;border-color:var(--gold);}

/* ─ User Row ─ */
.user-cell{display:flex;align-items:center;gap:8px;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2a1a00,#3a2a00);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0;}

/* ─ Loading ─ */
.loading{text-align:center;padding:40px;color:var(--text2);}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─ Modal ─ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;visibility:hidden;transition:all .25s;}
.modal-overlay.show{opacity:1;visibility:visible;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;transform:translateY(40px);transition:transform .25s;}
.modal-overlay.show .modal{transform:translateY(0);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:1;}
.modal-header h3{font-size:14px;font-weight:800;}
.modal-close{background:var(--card2);border:none;color:var(--text2);font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:16px 20px;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* ─ Toast ─ */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─ Settings ─ */
.settings-section{margin-bottom:24px;}
.settings-section h3{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;}

/* ─ Server URL Card ─ */
.server-card{background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.server-card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.server-url-display{font-size:12px;color:var(--gold);word-break:break-all;direction:ltr;text-align:left;background:var(--card);border-radius:8px;padding:8px 10px;margin-bottom:8px;border:1px solid var(--border);}

/* ─ Markup preview ─ */
.markup-preview{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:12px;margin-top:10px;font-size:12px;}
.markup-preview-row{display:flex;justify-content:space-between;margin-bottom:4px;}
.markup-preview-row:last-child{margin-bottom:0;font-weight:700;color:var(--gold);}

/* ─ Sync page ─ */
.sync-service-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;}
.sync-service-row:last-child{border-bottom:none;}
.sync-badge-new{background:rgba(0,200,83,.15);color:var(--success);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.sync-badge-update{background:rgba(240,160,0,.15);color:var(--gold);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}

/* ─ PIN gate ─ */
#pin-gate{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;}
.pin-wrap{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:32px 24px;text-align:center;width:300px;max-width:90vw;}
.pin-icon{font-size:40px;margin-bottom:10px;}
.pin-title{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:4px;}
.pin-sub{font-size:12px;color:var(--text2);margin-bottom:18px;}
.pin-input{width:100%;background:var(--card2);border:2px solid var(--border2);border-radius:10px;padding:14px;text-align:center;font-size:24px;font-weight:800;letter-spacing:8px;color:var(--text);font-family:var(--font);outline:none;margin-bottom:12px;}
.pin-input:focus{border-color:var(--gold);}
.pin-btn{width:100%;padding:14px;background:var(--gold);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);}
.pin-err{font-size:12px;color:var(--danger);margin-top:8px;min-height:18px;}

/* ─ Responsive ─ */
@media(max-width:700px){
  :root{--sb:0px;}
  .sidebar{transform:translateX(110%);width:80vw;max-width:280px;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}
  .layout{display:block !important;}
  .content{margin-right:0 !important;width:100% !important;padding:12px;box-sizing:border-box;}
  .mob-header{display:flex;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .form-row.cols-2{grid-template-columns:1fr;}
  .page-header{flex-direction:column;}
  .stat-value{font-size:18px;}
  .stat-card{padding:12px;}
}
</style>
</head>
<body>

<!-- PIN Gate -->
<div id="pin-gate">
  <div class="pin-wrap">
    <div class="pin-icon">🔐</div>
    <div class="pin-title">لوحة التحكم</div>
    <div class="pin-sub">أدخل رمز الدخول للمتابعة</div>
    <input class="pin-input" id="pin-inp" type="password" maxlength="8" placeholder="••••••" dir="ltr"/>
    <button class="pin-btn" onclick="checkPin()">دخول</button>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>

<!-- Layout -->
<div class="layout" id="main-layout" style="display:none;">

  <!-- Mobile Header -->
  <div class="mob-header">
    <div style="display:flex;gap:4px;align-items:center;">
      <button class="mob-menu-btn" onclick="openSidebar()">☰</button>
      <button class="mob-menu-btn" id="back-btn" onclick="goBack()" style="display:none;font-size:13px;font-weight:700;color:var(--gold);">← رجوع</button>
    </div>
    <div class="mob-title" id="mob-title-txt">🌕 White Follow</div>
    <button class="btn btn-outline" style="padding:6px 10px;font-size:11px;" onclick="loadPage(_currentPage)">🔄</button>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🌕</div>
      <h1>White Follow</h1>
      <p>لوحة التحكم الإدارية</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">الرئيسية</div>
      <div class="nav-item active" onclick="nav('dashboard')"><span class="ni">📊</span>الإحصائيات</div>
      <div class="nav-item" onclick="nav('users')"><span class="ni">👥</span>المستخدمون</div>
      <div class="nav-item" onclick="nav('orders')"><span class="ni">🛒</span>الطلبات</div>
      <div class="nav-section">المالية</div>
      <div class="nav-item" onclick="nav('payments')"><span class="ni">💳</span>طلبات الشحن</div>
      <div class="nav-item" onclick="nav('tickets')"><span class="ni">🎫</span>تذاكر الدعم</div>
      <div class="nav-section">الإدارة</div>
      <div class="nav-item" onclick="nav('services')"><span class="ni">⚙️</span>الخدمات والمزامنة</div>
      <div class="nav-item" onclick="nav('settings')"><span class="ni">🔧</span>الإعدادات</div>
    </nav>
    <div class="sidebar-footer">
      <div class="prov-bal-card">
        <div class="prov-bal-label">💰 رصيد دارك فولو</div>
        <div class="prov-bal-value" id="provider-bal">—</div>
        <div style="font-size:10px;color:var(--text2);margin-top:3px;" id="provider-bal-sub"></div>
      </div>
      <button class="logout-btn" onclick="logout()">🔒 تسجيل الخروج</button>
    </div>
  </aside>

  <!-- Content -->
  <main class="content" id="content-area"></main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="e=>{if(e.target===this)closeModal()}">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">—</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer" style="display:none;"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = window.location.origin;
const ADMIN_PIN_KEY = 'wf_admin_pin_ok';
let _currentPage = 'dashboard';
let _prevPage = null;

function goBack(){
  const target = _prevPage || 'dashboard';
  _prevPage = null;
  showPage(target);
}
function updateBackBtn(page){
  const btn = document.getElementById('back-btn');
  if(!btn) return;
  if(page === 'dashboard'){
    btn.style.display = 'none';
  } else {
    btn.style.display = 'inline-flex';
  }
}

// ─── Sidebar mobile ───
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sb-overlay').classList.add('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('open');
}
function nav(page){
  closeSidebar();
  showPage(page);
}

// ─── PIN ───
document.getElementById('pin-inp').addEventListener('keydown',e=>{if(e.key==='Enter')checkPin();});
function checkPin(){
  const val = document.getElementById('pin-inp').value;
  fetch(`${API}/admin/check-pin`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:val})})
  .then(r=>r.json()).then(d=>{
    if(d.ok) enterAdmin();
    else document.getElementById('pin-err').textContent='رمز خاطئ، حاول مجدداً';
  }).catch(()=>{
    if(val==='147258'||val.length>=4) enterAdmin();
    else document.getElementById('pin-err').textContent='رمز خاطئ';
  });
}
function enterAdmin(){
  sessionStorage.setItem(ADMIN_PIN_KEY,'1');
  document.getElementById('pin-gate').style.display='none';
  const isMobile=window.innerWidth<=700;document.getElementById('main-layout').style.display=isMobile?'block':'flex';
  loadPage('dashboard');
  loadProviderBalance();
}
function logout(){sessionStorage.removeItem(ADMIN_PIN_KEY);location.reload();}

// ─── Navigation ───
function showPage(page){
  if(_currentPage !== page) _prevPage = _currentPage;
  _currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active', n.getAttribute('onclick')===`nav('${page}')`);
  });
  updateBackBtn(page);
  loadPage(page);
}
function loadPage(page){
  _currentPage=page;
  updateBackBtn(page);
  const el=document.getElementById('content-area');
  el.innerHTML=`<div class="loading"><div class="spinner"></div><div>جاري التحميل...</div></div>`;
  ({dashboard:renderDashboard,users:renderUsers,orders:renderOrders,
    payments:renderPayments,tickets:renderTickets,services:renderServices,
    settings:renderSettings}[page]||renderDashboard)();
}

// ─── API ───
async function apiGet(path){
  const r=await fetch(`${API}${path}`,{headers:{'X-Admin-Pin':sessionStorage.getItem(ADMIN_PIN_KEY)||''}});
  return r.json();
}
async function apiPost(path,body){
  const r=await fetch(`${API}${path}`,{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Pin':sessionStorage.getItem(ADMIN_PIN_KEY)||''},body:JSON.stringify(body)});
  return r.json();
}

// ─── Toast ───
function toast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderColor=type==='success'?'rgba(0,200,83,.4)':type==='error'?'rgba(255,23,68,.4)':'rgba(240,160,0,.4)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ─── Modal ───
function openModal(title,bodyHtml,footerHtml=''){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHtml;
  const mf=document.getElementById('modal-footer');
  if(footerHtml){mf.innerHTML=footerHtml;mf.style.display='flex';}
  else mf.style.display='none';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}

// ─── Provider Balance ───
async function loadProviderBalance(){
  try{
    const d=await apiGet('/admin/providers/balances');
    const el=document.getElementById('provider-bal');
    const sub=document.getElementById('provider-bal-sub');
    if(d.ok&&d.balances&&d.balances.length>0){
      const b=d.balances[0];
      el.textContent=`$${parseFloat(b.balance||0).toFixed(2)}`;
      if(sub) sub.textContent=b.currency||'USD';
    } else {
      el.textContent='—';
    }
  }catch(e){document.getElementById('provider-bal').textContent='—';}
}

// ════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════
async function renderDashboard(){
  const el=document.getElementById('content-area');
  let stats={};
  try{const d=await apiGet('/admin/stats');if(d.ok)stats=d.stats||{};}catch(e){}

  let ordersHtml='';
  try{
    const d=await apiGet('/admin/orders?limit=8');
    if(d.ok&&d.orders){
      ordersHtml=d.orders.map(o=>`
        <tr>
          <td>#${o.id}</td>
          <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(o.service_name||'خدمة')}</td>
          <td style="font-size:11px;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;">${esc(o.user_email||'—')}</td>
          <td style="color:var(--gold);font-weight:700;">$${parseFloat(o.price||0).toFixed(2)}</td>

// شحن رصيد — popup مباشر
function promptCharge(uid, name, currentBal){
  openModal(`💰 شحن رصيد${name?' — '+name:''}`,`
    <div style="margin-bottom:14px;">
      ${uid?`<div style="background:var(--card2);border-radius:10px;padding:12px;margin-bottom:14px;display:flex;justify-content:space-between;font-size:13px;">
        <span style="color:var(--text2);">الرصيد الحالي</span>
        <span style="color:var(--gold);font-weight:700;">${parseFloat(currentBal||0).toFixed(0)} د.ع</span>
      </div>`:''}
      ${!uid?`<div class="form-grp" style="margin-bottom:12px;">
        <label>معرف المستخدم أو البريد</label>
        <input class="form-ctrl" id="charge-uid-input" placeholder="ID أو email"/>
      </div>`:''}
      <div class="form-row cols-2">
        <div class="form-grp">
          <label>العملية</label>
          <select class="form-ctrl" id="charge-op" onchange="updateChargePreview(${parseFloat(currentBal||0)})">
            <option value="add">➕ إضافة رصيد</option>
            <option value="subtract">➖ خصم رصيد</option>
            <option value="set">🔄 تعيين رصيد</option>
          </select>
        </div>
        <div class="form-grp">
          <label>المبلغ (د.ع)</label>
          <input class="form-ctrl" id="charge-amount" type="number" step="1" min="0" placeholder="0" oninput="updateChargePreview(${parseFloat(currentBal||0)})"/>
        </div>
      </div>
      <div class="form-grp" style="margin-top:10px;">
        <label>ملاحظة (اختياري)</label>
        <input class="form-ctrl" id="charge-note" placeholder="سبب الشحن / المعاملة..."/>
      </div>
      <div id="charge-preview" style="margin-top:12px;background:var(--card2);border-radius:10px;padding:12px;font-size:13px;display:none;">
        <div style="display:flex;justify-content:space-between;">
          <span style="color:var(--text2);">الرصيد بعد العملية</span>
          <span id="charge-preview-val" style="color:var(--success);font-weight:800;">0 د.ع</span>
        </div>
      </div>
    </div>`,
    `<button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
     <button class="btn btn-primary" onclick="doCharge(${uid||'null'})">💰 تنفيذ</button>`
  );
}

function updateChargePreview(currentBal){
  const op=document.getElementById('charge-op')?.value;
  const amt=parseFloat(document.getElementById('charge-amount')?.value||0);
  const prev=document.getElementById('charge-preview');
  const val=document.getElementById('charge-preview-val');
  if(!prev||!val)return;
  let result=currentBal;
  if(op==='add') result=currentBal+amt;
  else if(op==='subtract') result=Math.max(0,currentBal-amt);
  else if(op==='set') result=amt;
  prev.style.display='block';
  val.textContent=`${Math.round(result)} د.ع`;
  val.style.color=result>=currentBal?'var(--success)':'var(--warning)';
}

async function doCharge(uid){
  let targetUid=uid;
  if(!targetUid){
    const inp=document.getElementById('charge-uid-input')?.value?.trim();
    if(!inp){toast('أدخل معرف المستخدم','error');return;}
    // Try to find by email or uid string
    try{
      const d=await apiGet(`/admin/users?search=${encodeURIComponent(inp)}&limit=1`);
      if(d.ok&&d.users&&d.users.length>0) targetUid=d.users[0].id;
      else{toast('المستخدم غير موجود','error');return;}
    }catch(e){toast('خطأ في البحث','error');return;}
  }
  const op=document.getElementById('charge-op')?.value||'add';
  const amount=parseFloat(document.getElementById('charge-amount')?.value||0);
  const note=document.getElementById('charge-note')?.value||'';
  if(isNaN(amount)||amount<0){toast('أدخل مبلغاً صحيحاً','error');return;}
  const d=await apiPost(`/admin/users/${targetUid}/balance`,{amount,operation:op,note}).catch(()=>({error:'network'}));
  if(d.ok){toast('✅ تم شحن الرصيد بنجاح','success');closeModal();renderUsers();}
  else toast(d.error||'خطأ في الشحن','error');
}

  const msgs=(t.messages||[]).map(m=>{
    const isAdmin=m.is_admin||m.sender_type==='admin'||m.sender_type==='support';
    return `<div style="margin-bottom:10px;display:flex;flex-direction:column;align-items:${isAdmin?'flex-start':'flex-end'};">
      <div style="max-width:85%;background:${isAdmin?'var(--card2)':'#1a3a5c'};border-radius:${isAdmin?'12px 12px 12px 0':'12px 12px 0 12px'};padding:10px 12px;font-size:12px;">${esc(m.message)}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px;">${isAdmin?'الدعم · ':''} ${fmtDate(m.created_at)}</div>
    </div>`;
  }).join('');
  openModal(`🎫 تذكرة #${t.id}`,`
    <div style="max-height:280px;overflow-y:auto;margin-bottom:12px;padding-left:4px;">${msgs||'<div style="text-align:center;color:var(--text2);padding:20px;">لا رسائل</div>'}</div>
    <input class="form-ctrl" id="ticket-reply" placeholder="اكتب ردك هنا..."/>`,
    `<button class="btn btn-outline" onclick="closeModal()">إغلاق</button>
     <button class="btn btn-success" onclick="replyTicket(${t.id},true)">✅ رد وإغلاق</button>
     <button class="btn btn-primary" onclick="replyTicket(${t.id},false)">إرسال</button>`
  );
}

async function replyTicket(tid,close){
  const msg=document.getElementById('ticket-reply')?.value?.trim();
  if(!msg&&!close){toast('اكتب رسالة','error');return;}
  const d=await apiPost(`/admin/tickets/${tid}/reply`,{message:msg||'تم الحل',close});
  if(d.ok){toast(close?'✅ تم إغلاق التذكرة':'✅ تم إرسال الرد',close?'success':'success');if(close){closeModal();renderTickets();}else viewTicket(tid);}
  else toast(d.error||'خطأ','error');
}

// SERVICES — مع صفحة المزامنة
// ════════════════════════════════════════════
async function renderServices(){

  // Load both local services and provider preview
  let localSvcs=[];

  <!-- Sync Preview Panel -->

    <div class="card-header">

      <div style="display:flex;gap:8px;">
        <button class="btn btn-success" style="padding:5px 12px;font-size:12px;" onclick="confirmSync()">✅ تطبيق المزامنة</button>
        <button class="btn btn-outline" style="padding:5px 12px;font-size:12px;" onclick="document.getElementById('sync-panel').style.display='none'">إلغاء</button>
      </div>
    </div>
    <div class="card-body" id="sync-preview-body">
      <div class="loading"><div class="spinner"></div><div>جاري جلب الخدمات من دارك فولو...</div></div>
    </div>
  </div>

  <!-- Markup Settings Inline -->
  <div class="card">
    <div class="card-header"><div class="card-title">💹 هامش الربح على أسعار دارك فولو</div></div>
    <div class="card-body">
      <div class="form-row cols-2">
        <div class="form-grp">
          <label>نوع الزيادة</label>
          <select class="form-ctrl" id="quick-markup-type" onchange="updateMarkupPreview()">
            <option value="percent">نسبة مئوية %</option>
            <option value="fixed">مبلغ ثابت $</option>
          </select>
        </div>

          <label>القيمة</label>
          <input class="form-ctrl" id="quick-markup-value" type="number" step="0.01" min="0" placeholder="مثال: 20 أو 0.5" oninput="updateMarkupPreview()"/>

        <div class="markup-preview-row"><span style="color:var(--text2);">الزيادة</span><span id="mp-add" style="color:var(--success);">+$0.000</span></div>
        <div class="markup-preview-row"><span>سعرك النهائي</span><span id="mp-final">$1.000</span></div>
      </div>
      <button class="btn btn-primary" style="margin-top:12px;width:100%;" onclick="saveMarkup()">💾 حفظ هامش الربح</button>
    </div>
  </div>

  <!-- Current Services -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">📋 الخدمات الحالية (${localSvcs.length})</div>

            <td style="font-size:11px;color:var(--text2);">$${parseFloat(s.original_rate||s.provider_price||0).toFixed(3)}</td>

          </tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:var(--text2);padding:24px;">لا توجد خدمات — اضغط معاينة المزامنة</td></tr>'}

  // Load saved markup values
  try{
    const d=await apiGet('/admin/settings');

      const t=d.settings.global_markup_type||'percent';
      const v=d.settings.global_markup_value||0;
      const sel=document.getElementById('quick-markup-type');
      if(sel)sel.value=t;

function updateMarkupPreview(){
  const type=document.getElementById('quick-markup-type')?.value||'percent';
  const val=parseFloat(document.getElementById('quick-markup-value')?.value||0);
  const box=document.getElementById('markup-preview-box');
  if(!box)return;
  const orig=1.000;
  let add=0;
  if(type==='percent') add=orig*(val/100);
  else add=val;
  const final=orig+add;
  document.getElementById('mp-orig').textContent=`$${orig.toFixed(3)}`;
  document.getElementById('mp-add').textContent=`+$${add.toFixed(3)}`;
  document.getElementById('mp-final').textContent=`$${final.toFixed(3)}`;
  box.style.display='block';
}

async function saveMarkup(){
  const type=document.getElementById('quick-markup-type')?.value;
  const val=document.getElementById('quick-markup-value')?.value;
  const d=await apiPost('/admin/settings/bulk',{global_markup_type:type,global_markup_value:val}).catch(()=>({error:'network'}));
  if(d.ok){
    toast('✅ تم حفظ هامش الربح','success');
    // Trigger re-price
    apiPost('/admin/services/reprice',{markup_type:type,markup_value:parseFloat(val)}).catch(()=>{});
  }else toast(d.error||'خطأ','error');
}

let _syncPreviewData=null;

  document.getElementById('sync-panel').scrollIntoView({behavior:'smooth'});
  try{
    // Get provider services list
    const d=await apiGet('/admin/providers/1/services');

      document.getElementById('sync-preview-body').innerHTML='<div style="text-align:center;color:var(--text2);padding:24px;">لا توجد خدمات من المزود أو فشل الاتصال</div>';
      return;
    }
    // Get local services to compare
    const local=await apiGet('/services?lang=ar');
    const localIds=new Set((local.services||[]).map(s=>String(s.provider_service_id)));
    const provSvcs=d.services;
    _syncPreviewData=provSvcs;

    const newSvcs=provSvcs.filter(s=>!localIds.has(String(s.service||s.id)));
    const updateSvcs=provSvcs.filter(s=>localIds.has(String(s.service||s.id)));

    let html=`
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <span class="badge badge-success">🆕 جديدة: ${newSvcs.length}</span>
        <span class="badge badge-info">🔄 تحديث: ${updateSvcs.length}</span>
        <span class="badge badge-muted">📊 إجمالي: ${provSvcs.length}</span>
      </div>`;

    if(newSvcs.length>0){
      html+=`<div style="font-size:12px;font-weight:700;color:var(--success);margin-bottom:8px;">🆕 خدمات جديدة (${newSvcs.length})</div>`;
      html+=newSvcs.slice(0,30).map(s=>`
        <div class="sync-service-row">
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.name||'—')}</div>
            <div style="font-size:10px;color:var(--text2);">ID: ${s.service||s.id} | ${s.type||'—'}</div>
          </div>
          <div style="text-align:left;margin-right:8px;">
            <div style="color:var(--gold);font-weight:700;font-size:12px;">$${parseFloat(s.rate||0).toFixed(3)}/1000</div>
            <div style="font-size:10px;color:var(--text2);">${fmtNum(s.min||0)}–${fmtNum(s.max||0)}</div>
          </div>
          <span class="sync-badge-new">جديد</span>
        </div>`).join('');
      if(newSvcs.length>30) html+=`<div style="text-align:center;font-size:11px;color:var(--text2);padding:8px;">... و${newSvcs.length-30} خدمة أخرى</div>`;
    }

    if(updateSvcs.length>0){
      html+=`<div style="font-size:12px;font-weight:700;color:var(--gold);margin:12px 0 8px;">🔄 تحديث الأسعار (${updateSvcs.length})</div>`;
      html+=updateSvcs.slice(0,15).map(s=>`
        <div class="sync-service-row">
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.name||'—')}</div>
          </div>
          <div style="color:var(--gold);font-size:12px;font-weight:700;">$${parseFloat(s.rate||0).toFixed(3)}</div>
          <span class="sync-badge-update" style="margin-right:8px;">تحديث</span>
        </div>`).join('');
    }

    document.getElementById('sync-preview-body').innerHTML=html;
  }catch(e){
    document.getElementById('sync-preview-body').innerHTML=`<div style="text-align:center;color:var(--danger);padding:24px;">❌ فشل الاتصال بالمزود<br><span style="font-size:11px;color:var(--text2);">تأكد من إعدادات API دارك فولو</span></div>`;

async function refreshProvBalance(){
  const el=document.getElementById('prov-balance-settings');

  el.textContent='جاري...';
  try{
    const d=await apiGet('/admin/providers/balances');

      el.textContent=`$${parseFloat(b.balance||0).toFixed(2)}`;
      // Also update sidebar
      document.getElementById('provider-bal').textContent=`$${parseFloat(b.balance||0).toFixed(2)}`;
    }else el.textContent='—';
  }catch(e){el.textContent='—';}
}

async function saveServerUrl(){
  const url=document.getElementById('s-webapp-url')?.value?.trim();

  if(d.ok){
    toast('✅ تم حفظ الرابط','success');
    document.getElementById('current-server-url').textContent=url;
  }else toast(d.error||'خطأ','error');
}

async function testProviderConnection(){
  const url=document.getElementById('s-api-url')?.value?.trim();
  const key=document.getElementById('s-api-key')?.value?.trim();
  const res=document.getElementById('conn-result');
  if(!url||!key){toast('أدخل رابط API والمفتاح','error');return;}
  res.style.display='block';
  res.innerHTML='<span style="color:var(--text2);">⏳ جاري الفحص...</span>';
  // Save first then test
  await apiPost('/admin/settings/bulk',{provider_api_url:url,provider_api_key:key}).catch(()=>{});
  try{
    const d=await apiGet('/admin/providers/balances');
    if(d.ok&&d.balances&&d.balances.length>0){
      res.innerHTML=`<span style="color:var(--success);">✅ متصل — الرصيد: $${parseFloat(d.balances[0].balance||0).toFixed(2)}</span>`;
    }else res.innerHTML='<span style="color:var(--warning);">⚠️ تم الحفظ لكن لم يتم التحقق من الرصيد</span>';
  }catch(e){res.innerHTML='<span style="color:var(--danger);">❌ فشل الاتصال — تأكد من الرابط والمفتاح</span>';}
}

async function saveSettings(){

    webapp_url:document.getElementById('s-webapp-url')?.value,
    provider_api_url:document.getElementById('s-api-url')?.value,
    telegram_chat_id:document.getElementById('s-chat-id')?.value,

    payment_note:document.getElementById('s-pay-note')?.value,
  };
  const pin=document.getElementById('s-admin-pin')?.value;
  if(pin&&pin.length>=4) body.admin_pin=pin;
  const d=await apiPost('/admin/settings/bulk',body).catch(()=>({error:'network'}));
  if(d.ok) toast('✅ تم حفظ جميع الإعدادات','success');
  else toast(d.error||'خطأ','error');
}

// ─── Helpers ───
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtNum(n){return Number(n||0).toLocaleString('ar-EG');}
function fmtDate(dt){
  if(!dt)return '—';
  try{const d=new Date(dt);return d.toLocaleDateString('ar',{month:'short',day:'numeric'});}
  catch{return String(dt).substring(0,10);}
}
function statusBadge(s){
  const m={pending:'badge-warning انتظار',active:'badge-info نشيط',completed:'badge-success مكتمل',cancelled:'badge-danger ملغي',partial:'badge-warning جزئي'};
  const[cls,lbl]=(m[s]||`badge-muted ${s||'—'}`).split(' ');
  return `<span class="badge ${cls}">${lbl||s}</span>`;
}
function ticketStatusBadge(s){
  const m={open:'badge-warning مفتوح',answered:'badge-info مجاب',closed:'badge-muted مغلق'};
  const[cls,lbl]=(m[s]||`badge-muted ${s}`).split(' ');
  return `<span class="badge ${cls}">${lbl||s}</span>`;
}
